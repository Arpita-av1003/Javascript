<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api Request</title>
</head>
<body>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nemo, sequi. Suscipit reiciendis aliquam, ea quidem distinctio, eaque consequuntur atque odio eligendi facilis tempora quae dolore alias, dolores corrupti architecto repellendus.</p>
</body>

<script>
    const requestURl='https://jsonplaceholder.typicode.com/posts'
    const JustRequest = new XMLHttpRequest();
    JustRequest.open('GET',requestURl);
    JustRequest.onreadystatechange=function(){
        console.log(JustRequest.readyState);
        if(JustRequest.readyState===4){
            const data=JSON.parse(JustRequest.responseText);
            console.log(typeof data);
            console.log(data);
        }
    }
    JustRequest.send();
     
</script>
</html>
