<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: rgb(235, 194, 234);
        }
        ul{
            margin: 0;
            padding:0;
            list-style-type: none;
            display: flex;
            background-color: rgb(197, 45, 197);
        }
        ul li{
            padding: 8px 10px;

        }
        li a{
            text-decoration: none;
            color: white;

        }
        li:hover{
            background-color: rgb(235, 80, 206);
        }
        .container{
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container h1{
            text-decoration: underline;
            padding: 10px;
            margin-top:50px ;
        }
        button{
            color:white;
            background-color: rgb(197, 45, 197);
            height: 30px;
            width: 100px;
            margin-top: 30px;
        }
        form{
            border: 1px solid purple;
            width: 400px;
            height: 500px;

        }
        form p{
            padding: 5px;
        }
         #weight-guide{
            margin-top: 9cap;
         }
    </style>

</head>
<body>
   <nav>
      <ul>
        <li><a href="/" aria-current="page">Home</a></li>
        <li><a target="_blank" href="https://www.youtube.com/">YouTube</a></li>
      </ul>
    </nav>
    <div class="container">
    <h1>BMI Calculator</h1>
    <form action="">
         <p><label for="">Height in CM:</label><input type="text" id="height"></p>
     <p><label for="">Weight in KG:</label><input type="text" id="weight"></p>
     <button>Calculate</button>
     <div id="results"></div>
     <div id="weight-guide">
        <h3>BMI Weight Guide</h3>
        <p>Under Weight = Less than 18.6</p>
        <p>Normal Weight = 18.6 and 24.9</p>
        <p>Overweight = Greater than 24.9</p>
     </div>
    </form>
    </div>
</body>

<script>
 const form= document.querySelector('form')

 form.addEventListener('submit',function(e){
    e.preventDefault()
    const height=parseInt(document.querySelector('#height').value)
    const weight=parseInt(document.querySelector('#weight').value)
 })
</script>
</html>
